name: Refresh Chain Events (first-party poller)

# Decodes recent finney chain events FIRST-PARTY — substrate System.Events over
# PUBLIC RPC, no API key, NOT Taostats (#1346, epic #1345) — and stages them to
# R2; the Worker's scheduled handler then bulk-loads them into the
# metagraphed-health D1 `account_events` table through its binding
# (loadStagedEvents), no API-token D1 permission required. Powers
# /api/v1/accounts/{ss58} + history (#1347).
#
# Rolling recent-block window + idempotent load (INSERT OR IGNORE on
# (block_number, event_index)), so frequent overlapping runs need no cursor and
# self-heal small gaps. Live-forward only: public nodes prune ~300 blocks, so this
# runs often to stay inside that window; deep history is the optional archive-RPC
# upgrade (#1349). Reuses METAGRAPH_STAGING_SIGNING_KEY (same as refresh-metagraph).
on:
  schedule:
    # Every 5 min (#1346 Option A) — the practical CI floor (each run has ~3 min of
    # setup). Paired with the Worker's */3 fast-load cron, this puts chain-event
    # latency at ~5 min (down from ~20). True ~12s realtime is Option B (epic #1345).
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-events
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # No `cache: npm` here on purpose: this workflow holds Cloudflare secrets, so
      # we don't consume a shared npm cache another workflow could poison.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.23.0

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install
        run: npm ci

      # Read the high-water cursor (highest block previously staged) from R2 before
      # polling. The poller scans `min(window-floor, cursor+1) .. head` (ADR 0012): it
      # always re-scans the overlap window AND extends back to cursor+1 to recover a
      # scheduler-coalescing gap, bounded by EVENTS_MAX_LOOKBACK. On PUBLIC RPC that
      # bound is the prune horizon (gaps wider than it are already pruned — best-effort,
      # lossy by construction); pointed at the ARCHIVE node (ADR 0012 / #1349) with a
      # high EVENTS_MAX_LOOKBACK, recovery is COMPLETE. A cold start (no object yet) is
      # fine: `get` fails, EVENTS_CURSOR stays blank → window floor. `|| true` so a
      # missing object or transient R2 blip never fails the run.
      - name: Read event cursor from R2
        id: cursor
        run: |
          rm -f cursor.json
          npx wrangler r2 object get metagraphed-artifacts/events/cursor.json --file=cursor.json --remote || true
          block="$(python3 -c 'import json,sys
          try:
              print(int(json.load(open("cursor.json"))["block_number"]))
          except Exception:
              print("")' )"
          echo "block=${block}" >> "$GITHUB_OUTPUT"
          echo "event cursor block: ${block:-<cold start>}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Check staged event drains are clear
        id: pending
        run: |
          set +e
          pending=0
          max_staged_bytes=4194304
          for key in \
            events/account-events-pending.json \
            events/blocks-pending.json \
            events/extrinsics-pending.json; do
            staged_file="/tmp/${key##*/}"
            rm -f "${staged_file}"
            npx wrangler r2 object get "metagraphed-artifacts/${key}" --file="${staged_file}" --remote >/dev/null 2>&1
            status=$?
            if [ "$status" -eq 0 ]; then
              size=$(wc -c < "${staged_file}" | tr -d ' ')
              if [ "${size}" -gt "${max_staged_bytes}" ]; then
                echo "${key} is ${size} bytes, above the Worker drain cap; allow this producer tick to replace it"
              else
                echo "${key} is still pending; skip this producer tick so the Worker can drain it"
                pending=1
              fi
            fi
          done
          echo "skip=${pending}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # substrate-interface is PINNED to an exact, verified version: this step runs
      # with Cloudflare secrets in scope, so we never auto-pull a future (possibly
      # compromised) release from PyPI. Bump deliberately after re-verifying.
      - name: Poll finney events (first-party, public RPC, no key)
        if: steps.pending.outputs.skip != '1'
        run: uv run --with substrate-interface==1.8.1 python scripts/fetch-events.py
        env:
          # Chain RPC endpoint, behind a SECRET so the private archive node's URL is
          # never exposed in the repo or run logs once we switch to it (ADR 0012 /
          # #1349). Falls back to the public finney endpoint when the secret is unset,
          # so swapping = set/clear the one `SUBTENSOR_RPC_URL` secret — no code change.
          EVENTS_RPC_URL: ${{ secrets.SUBTENSOR_RPC_URL || 'wss://entrypoint-finney.opentensor.ai:443' }}
          # Bounded overlap: ~250 blocks ≈ 50 min of chain is re-scanned every
          # run so staged-but-not-yet-loaded event batches can be regenerated if
          # the single pending R2 object is overwritten before the Worker drains it.
          EVENTS_WINDOW: "250"
          # Highest block already staged; the poller resumes from cursor+1 to recover
          # a coalescing gap (bounded by EVENTS_MAX_LOOKBACK) and uses it for lag/health.
          EVENTS_CURSOR: ${{ steps.cursor.outputs.block }}
          # Cap on gap recovery (non-sensitive → a VARIABLE, not a secret). Default
          # 300 = prune horizon, correct for PUBLIC RPC. Once EVENTS_RPC_URL points at
          # the ARCHIVE node, set the `EVENTS_MAX_LOOKBACK` repo variable high (e.g.
          # 1000000) so a long scheduler gap is recovered over bounded batches.
          EVENTS_MAX_LOOKBACK: ${{ vars.EVENTS_MAX_LOOKBACK || '300' }}
          # Producer-side cap: one staged object covers at most this many blocks;
          # cursor recovery continues on later ticks after pending objects drain.
          EVENTS_BATCH_BLOCKS: ${{ vars.EVENTS_BATCH_BLOCKS || '250' }}
          # Emit a ::warning:: (and webhook alert, if configured) when the cursor
          # falls within a window of the public-RPC prune horizon.
          METAGRAPH_ALERT_WEBHOOK_URL: ${{ secrets.METAGRAPH_ALERT_WEBHOOK_URL }}

      - name: Sign staged chain-event batch
        if: steps.pending.outputs.skip != '1'
        run: node scripts/sign-staged-neurons.mjs dist/account-events.json
        env:
          METAGRAPH_STAGING_SIGNING_KEY: ${{ secrets.METAGRAPH_STAGING_SIGNING_KEY }}

      # Stage to R2 (the token's existing R2 permission); the Worker loads it into
      # D1 through its binding (loadStagedEvents) — no API-token D1 permission.
      - name: Stage events to R2 for the Worker to load into D1
        if: steps.pending.outputs.skip != '1'
        run: npx wrangler r2 object put metagraphed-artifacts/events/account-events-pending.json --file=dist/account-events.json --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Block-explorer hot window (#1345): the same poller wrote a `blocks`
      # sidecar (dist/blocks.json). Sign + stage it exactly like the events batch
      # — same signer (HMAC envelope), same R2 token, sibling staging key; the
      # Worker loads it into D1 `blocks` via loadStagedBlocks on the same */3
      # fast-load cron (no API-token D1 permission). INSERT OR IGNORE on
      # block_number makes overlapping windows idempotent.
      - name: Sign staged block batch
        if: steps.pending.outputs.skip != '1'
        run: node scripts/sign-staged-neurons.mjs dist/blocks.json
        env:
          METAGRAPH_STAGING_SIGNING_KEY: ${{ secrets.METAGRAPH_STAGING_SIGNING_KEY }}

      - name: Stage blocks to R2 for the Worker to load into D1
        if: steps.pending.outputs.skip != '1'
        run: npx wrangler r2 object put metagraphed-artifacts/events/blocks-pending.json --file=dist/blocks.json --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Block-explorer extrinsic slice (#1345): the same poller wrote an
      # `extrinsics` sidecar (dist/extrinsics.json). Sign + stage it exactly like
      # the blocks batch — same signer (HMAC envelope), same R2 token, sibling
      # staging key; the Worker loads it into D1 `extrinsics` via
      # loadStagedExtrinsics on the same */3 fast-load cron (no API-token D1
      # permission). INSERT OR IGNORE on (block_number, extrinsic_index) makes
      # overlapping windows idempotent.
      - name: Sign staged extrinsic batch
        if: steps.pending.outputs.skip != '1'
        run: node scripts/sign-staged-neurons.mjs dist/extrinsics.json
        env:
          METAGRAPH_STAGING_SIGNING_KEY: ${{ secrets.METAGRAPH_STAGING_SIGNING_KEY }}

      - name: Stage extrinsics to R2 for the Worker to load into D1
        if: steps.pending.outputs.skip != '1'
        run: npx wrangler r2 object put metagraphed-artifacts/events/extrinsics-pending.json --file=dist/extrinsics.json --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Advance the cursor ONLY after a successful stage above. fetch-events wrote
      # the next cursor (the max block it scanned) to dist/events-cursor.json; promote
      # it to R2 for lag/health accounting. The poller still re-scans the bounded
      # overlap window because R2 staging is not proof of asynchronous D1 import.
      - name: Advance event cursor in R2
        if: steps.pending.outputs.skip != '1'
        run: npx wrangler r2 object put metagraphed-artifacts/events/cursor.json --file=dist/events-cursor.json --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Notify on failure
        if: failure() && env.METAGRAPH_ALERT_WEBHOOK_URL != ''
        env:
          METAGRAPH_ALERT_WEBHOOK_URL: ${{ secrets.METAGRAPH_ALERT_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST "$METAGRAPH_ALERT_WEBHOOK_URL" \
            -H 'content-type: application/json' \
            -d '{"content":"🔴 metagraphed refresh-events FAILED — chain-event index may go stale."}' || true
