name: Publish client SDK

# Publishes @jsonbored/metagraphed (packages/client) to npm via OIDC trusted
# publishing — no NPM_TOKEN. Manual trigger; the version is read from
# packages/client/package.json. Requires a one-time npm-side setup (see
# packages/client/PUBLISHING.md): a first bootstrap
# publish, and a Trusted Publisher pointing at this repo + workflow + the
# `npm-production` environment.
on:
  # Auto: release-please tags `client-v<semver>` when its Release PR merges
  # (#394) → publish to npm. Manual: workflow_dispatch is kept as an override.
  push:
    tags:
      - "client-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: client-package-release
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24.16.0
          registry-url: https://registry.npmjs.org

      - name: Validate release version
        run: bash scripts/validate-client-release.sh

      # Build + pack happen in THIS unprivileged job (no id-token). The privileged
      # publish job below never runs npm install/build, so a compromised build
      # dependency can't reach the OIDC token (codex #251).
      - name: Build package tarball
        working-directory: packages/client
        run: |
          set -euo pipefail
          npm install --no-audit --no-fund
          npm run build
          npm pack --pack-destination "$RUNNER_TEMP"
          count=$(find "$RUNNER_TEMP" -maxdepth 1 -type f -name "*.tgz" | wc -l | tr -d ' ')
          if [ "$count" != "1" ]; then
            echo "Expected exactly one tarball, found $count" >&2
            find "$RUNNER_TEMP" -maxdepth 1 -type f -name "*.tgz" -print >&2
            exit 1
          fi

      - name: Upload package tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: client-package-tarball
          path: ${{ runner.temp }}/*.tgz
          if-no-files-found: error
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    environment: npm-production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24.16.0
          registry-url: https://registry.npmjs.org

      - name: Validate release version
        id: release
        run: bash scripts/validate-client-release.sh

      # Pull the tarball built by the unprivileged validate job — this job never
      # runs npm install/build, so no third-party code executes while the OIDC
      # token is available (codex #251).
      - name: Download package tarball
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: client-package-tarball
          path: ${{ runner.temp }}/client-package

      - name: Publish to npm (OIDC trusted publishing)
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          count=$(find "$RUNNER_TEMP/client-package" -maxdepth 1 -type f -name "*.tgz" | wc -l | tr -d ' ')
          if [ "$count" != "1" ]; then
            echo "Expected exactly one tarball, found $count" >&2
            find "$RUNNER_TEMP/client-package" -maxdepth 1 -type f -name "*.tgz" -print >&2
            exit 1
          fi
          tarball=$(find "$RUNNER_TEMP/client-package" -maxdepth 1 -type f -name "*.tgz" -print -quit)
          npm publish "$tarball" --access public --provenance --ignore-scripts

      # Only on the manual override — when release-please triggers via the
      # client-v* tag, it has already created the tag + GitHub Release with the
      # generated notes, so re-creating them here would conflict (#394).
      - name: Tag + GitHub release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "@jsonbored/metagraphed v$RELEASE_VERSION"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          gh auth setup-git
          git push origin "$RELEASE_TAG"
          gh release create "$RELEASE_TAG" \
            --title "@jsonbored/metagraphed v$RELEASE_VERSION" \
            --generate-notes \
            --notes "Published \`@jsonbored/metagraphed@$RELEASE_VERSION\` to npm with provenance via OIDC trusted publishing. https://www.npmjs.com/package/@jsonbored/metagraphed/v/$RELEASE_VERSION"
