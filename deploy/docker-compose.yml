# Bare-metal "own the core" stack (ADR 0013) — one-command bring-up for the
# dedicated server: TimescaleDB + Redis + a subtensor node, one private
# bridge network (localhost-fast, zero egress). The continuous indexer is
# NOT included here — it's the Rust implementation (faster + more capable
# than the retired Python scripts/index-chain.py / backfill-chain.py), whose
# source doesn't have a git home in this repo yet (tracked: give it one, then
# add its compose service back here alongside a real Dockerfile).
#
#   cd /path/to/metagraphed
#   cp deploy/.env.example deploy/.env   # set POSTGRES_PASSWORD
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d
#
# Cloudflare reaches `postgres` via Hyperdrive over a tunnel (it never binds a
# public port here). To use MANAGED Railway Postgres instead, delete the
# `postgres` service and point the indexer's DATABASE_URL at the Railway URL —
# the schema is portable and nothing else changes.
name: metagraphed-core

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: metagraphed
      POSTGRES_USER: metagraphed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Both applied once, in order, on an empty data dir. schema.sql is the
      # portable base (no extensions); schema-timescaledb.sql layers on the
      # hypertable/compression upgrade (JSO-2054's decided option (a)) — safe
      # here since this image has the extension, unlike plain Railway Postgres.
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ./postgres/schema-timescaledb.sql:/docker-entrypoint-initdb.d/20-schema-timescaledb.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metagraphed -d metagraphed"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # The Bittensor node — a FULL ARCHIVE by default: --pruning=archive keeps the
  # complete state trie from genesis and --sync=full replays every block to build
  # it, so it is a real archive (state queryable at ANY block), the first-party
  # RPC origin, and a self-sufficient backfill source for the indexer.
  #
  #   Requires ~8 TB+ NVMe (chain ~3.5 TB + ~1.4 TB/yr) — see deploy/README.md.
  #   A from-genesis full sync takes DAYS; import an opentensor archive snapshot
  #   into the volume first to skip the replay.
  #   Dev override (pruned, small): SUBTENSOR_PRUNING=2000 SUBTENSOR_SYNC=warp.
  #   (NOTE: warp + archive is contradictory — warp skips historical state, so a
  #   real archive MUST use --sync=full.)
  # If you run subtensor directly on the host, drop this service and set the
  # indexer's EVENTS_RPC_URL to the host endpoint.
  subtensor:
    image: ghcr.io/opentensor/subtensor:latest
    restart: unless-stopped
    # `command:` REPLACES the image CMD, so --base-path MUST be re-supplied or the
    # node writes its DB to its home dir (not the volume) and re-syncs from scratch
    # on every restart.
    command:
      - --base-path=/data
      # NOT the bare name "finney" — verified against a real deploy that this
      # image's `--chain=finney` silently resolves to a DIFFERENT embedded
      # chainspec (wrong genesis) with zero error, so the node endlessly
      # rejects every real peer as "Genesis mismatch" and never syncs. The
      # image ships the correct spec as a file; point at it explicitly.
      - --chain=/home/subtensor/chainspecs/raw_spec_finney.json
      - --sync=${SUBTENSOR_SYNC:-full}
      - --pruning=${SUBTENSOR_PRUNING:-archive}
      - --rpc-external
      - --rpc-cors=all
    volumes:
      - subtensordata:/data
    expose:
      - "9944"

  # indexer: intentionally not defined here yet. The Rust implementation
  # (live-follow + sharded historical backfill in one binary) is the real
  # indexer going forward, but its source currently has no git remote —
  # give it one, then restore this service pointing at its real Dockerfile.
  # Expected env until then: DATABASE_URL (postgres above), EVENTS_RPC_URL
  # (the subtensor service above, or the archive node's RPC), INDEX_MODE=live
  # for the continuous follower vs. BACKFILL_FROM/BACKFILL_TO for a
  # historical run — see that project's own README once it has a home.

volumes:
  pgdata:
  redisdata:
  subtensordata:
